<!DOCTYPE html>
<html lang='es' class="no-js">

<head>
    <title>Asesorias deportivas</title>
    <script>document.documentElement.classList.remove('no-js');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="capucha.css">

</head>

<body class="pagina-capucha">
    <div class="hoodie-intro">
        <canvas id="bg"></canvas>
        <div id="blackout"></div>


        <header class="header">
            <div class="container">
                <nav class="nav-menu">
                    <a href="inicio.html">Inicio</a>
                    <a href="quienes.html">¿Quiénes somos?</a>
                    <a href="productos.html">Productos y servicios</a>
                    <a href="#contacto">Contacto</a>
                    <a href="trabaja.html">Trabaja con nosotros</a>

                </nav>
            </div>
        </header>

        <main>


            <h1 class="seleccion reveal">Formulario</h1>
            <form method="post" action="#">
                <fieldset class="izquierda reveal">
                    <legend>Datos personales</legend>
                    <label for="dato">Nombre y apellidos</label>
                    <input type="text" name="nombre" id="dato" size="20" maxlength="20" value=""
                        placeholder="Introduzca su nombre..." required><br>
                    <label for="dni">DNI</label>
                    <input type="text" id="dni" size="10" maxlength="9" value="" placeholder="DNI" required><br>
                    <label for="sexo">SEXO</label>
                    <input type="text" id="sexo" size="10" maxlength="10" value="" placeholder="SEXO"><br>
                    <label for="fecha">Fecha de nacimiento</label>
                    <input type="date" name="fecha" id="fecha" required><br>
                    <label for="ciudad">Ciudad</label>
                    <input type="text" id="ciudad" size="10" maxlength="10" value="" placeholder="ciudad"><br>
                    <label for="nacionalidad">Nacionalidad</label>
                    <input type="text" id="nacionalidad" size="10" maxlength="20" value=""
                        placeholder="Nacionalidad"><br>
                    <label for="codigo">Código postal</label>
                    <input type="text" name="codigo" id="codigo" size="10" maxlength="10"><br>
                    <label for="emails">Email:</label>
                    <input type="email" name="email" id="emails" placeholder="email"
                        pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$"><br>
                    <label for="telefonos">Teléfono:</label>
                    <input type="text" name="telefono" id="telefonos" size="20" maxlength="9" value=""
                        placeholder="teléfono"><br>
                </fieldset>
                <aside class="nota2 reveal">
                    <h3>TE ESTAMOS ESPERANDO</h3>
                </aside>
                <fieldset class="derecha reveal">
                    <legend>Formación</legend>

                    <label for="titulacion">Titulación:</label><br>
                    <input type="text" id="titulacion" name="titulacion"><br><br>

                    <label for="anio_inicio">Año de inicio:</label><br>
                    <input type="number" id="anio_inicio" name="anio_inicio" min="1950" max="2100"><br><br>

                    <label for="anio_fin">Año de finalización:</label><br>
                    <input type="number" id="anio_fin" name="anio_fin" min="1950" max="2100"><br><br>

                </fieldset>
                <fieldset class="centro reveal">
                    <legend>Idiomas</legend>

                    <label for="idioma">Idioma:</label><br>
                    <input type="text" id="idioma" name="idioma"><br><br>

                    <label for="hablado">Hablado:</label>
                    <select id="hablado" name="hablado">
                        <option>Excelente</option>
                        <option>Bien</option>
                        <option>Regular</option>
                        <option>Nada</option>
                    </select><br><br>

                    <label for="leido">Leído:</label>
                    <select id="leido" name="leido">
                        <option>Excelente</option>
                        <option>Bien</option>
                        <option>Regular</option>
                        <option>Nada</option>
                    </select><br><br>

                    <label for="escrito">Escrito:</label>
                    <select id="escrito" name="escrito">
                        <option>Excelente</option>
                        <option>Bien</option>
                        <option>Regular</option>
                        <option>Nada</option>
                    </select>
                    <input type="submit" value="Enviar..."><br>
                    <input type="reset" value="Resetear Formulario"><br>
                </fieldset>
            </form>



        </main>

        <footer class="footer" id="contacto">

            <div class="container footer-grid">
                <div>
                    <h4>Contacto</h4>
                    <p>📞 634 939 853</p>
                    <p>📍 Sevilla Capital, Calle Albareda 14</p>
                </div>
                <div>
                    <h4 Style="color: black;">Siguenos</h4>
                    <a href="https://www.facebook.com" target="_blank">
                        <img src="img/facebook.png" alt="Facebook" width="40">
                    </a>

                    <a href="https://www.instagram.com" target="_blank">
                        <img src="img/principal_logo-de-instagram-1-1.jpg" alt="Instagram" width="40">
                    </a>

                    <a href="https://x.com/home" target="_blank">
                        <img src="img/x.png" alt="Twitter" width="40">
                    </a>
                </div>



        </footer>

    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="scroll3D-hoodie.js"></script>
</body>

</html>
